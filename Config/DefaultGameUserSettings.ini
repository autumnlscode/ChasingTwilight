[ScalabilitySettings]
PerfIndexValues_ResolutionQuality="50 60 70 80 90"

; ============================================================
; DEFAULT SCALABILITY GROUPS
; Default = High (3)
; ============================================================

[ScalabilityGroups]
sg.ViewDistanceQuality=3
sg.AntiAliasingQuality=3
sg.ShadowQuality=2
sg.GlobalIlluminationQuality=3
sg.ReflectionQuality=3
sg.PostProcessQuality=2
sg.TextureQuality=3
sg.EffectsQuality=3
sg.FoliageQuality=3
sg.ShadingQuality=3


; ============================================================
; RESOLUTION QUALITY (TSR-FRIENDLY)
; ============================================================

[ResolutionQuality@0] ; Low
r.ScreenPercentage=80

[ResolutionQuality@1] ; Medium (Performance Mode)
r.ScreenPercentage=85

[ResolutionQuality@2] ; High
r.ScreenPercentage=100

[ResolutionQuality@3] ; Epic
r.ScreenPercentage=100


; ============================================================
; ANTI-ALIASING
; ============================================================

[AntiAliasingQuality@0]
r.PostProcessAAQuality=2

[AntiAliasingQuality@1]
r.PostProcessAAQuality=3

[AntiAliasingQuality@2]
r.PostProcessAAQuality=4

[AntiAliasingQuality@3]
r.PostProcessAAQuality=4


; ============================================================
; GLOBAL ILLUMINATION (LUMEN)
; ============================================================

[GlobalIlluminationQuality@0]
r.LumenScene.Quality=1
r.Lumen.DiffuseIndirect.Allow=1

[GlobalIlluminationQuality@1] ; Performance Mode
r.LumenScene.Quality=2
r.Lumen.DiffuseIndirect.Allow=1

[GlobalIlluminationQuality@2]
r.LumenScene.Quality=3
r.Lumen.DiffuseIndirect.Allow=1

[GlobalIlluminationQuality@3]
r.LumenScene.Quality=4
r.Lumen.DiffuseIndirect.Allow=1


; ============================================================
; REFLECTIONS (LUMEN)
; ============================================================

[ReflectionQuality@0]
r.Lumen.Reflections.Allow=0

[ReflectionQuality@1] ; Performance Mode
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.Quality=2

[ReflectionQuality@2]
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.Quality=3

[ReflectionQuality@3]
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.Quality=4


; ============================================================
; SHADOWS (KEY FPS LEVER)
; ============================================================

[ShadowQuality@0]
r.ShadowQuality=2
r.Shadow.MaxResolution=1024
r.Shadow.DistanceScale=0.6

[ShadowQuality@1] ; Performance Mode
r.ShadowQuality=3
r.Shadow.MaxResolution=1024
r.Shadow.DistanceScale=0.7

[ShadowQuality@2] ; High default
r.ShadowQuality=4
r.Shadow.MaxResolution=2048
r.Shadow.DistanceScale=0.8

[ShadowQuality@3]
r.ShadowQuality=5
r.Shadow.MaxResolution=2048
r.Shadow.DistanceScale=1.0


; ============================================================
; POST PROCESS (STYLIZED-FRIENDLY)
; ============================================================

[PostProcessQuality@0]
r.MotionBlurQuality=0
r.AmbientOcclusionLevels=0
r.BloomQuality=3

[PostProcessQuality@1] ; Performance Mode
r.MotionBlurQuality=0
r.AmbientOcclusionLevels=0
r.BloomQuality=4

[PostProcessQuality@2] ; High default
r.MotionBlurQuality=0
r.AmbientOcclusionLevels=1
r.BloomQuality=4

[PostProcessQuality@3]
r.MotionBlurQuality=0
r.AmbientOcclusionLevels=2
r.BloomQuality=5


; ============================================================
; VIEW DISTANCE
; ============================================================

[ViewDistanceQuality@0]
r.ViewDistanceScale=0.6

[ViewDistanceQuality@1] ; Performance Mode
r.ViewDistanceScale=0.8

[ViewDistanceQuality@2]
r.ViewDistanceScale=1.0

[ViewDistanceQuality@3]
r.ViewDistanceScale=1.2


; ============================================================
; EFFECTS
; ============================================================

[EffectsQuality@0]
r.ParticleLightQuality=0

[EffectsQuality@1] ; Performance Mode
r.ParticleLightQuality=1

[EffectsQuality@2]
r.ParticleLightQuality=2

[EffectsQuality@3]
r.ParticleLightQuality=3


; ============================================================
; FOLIAGE (FORESTS = FPS TRAP)
; ============================================================

[FoliageQuality@0]
foliage.DensityScale=0.5
grass.DensityScale=0.5

[FoliageQuality@1] ; Performance Mode
foliage.DensityScale=0.7
grass.DensityScale=0.7

[FoliageQuality@2]
foliage.DensityScale=0.9
grass.DensityScale=0.9

[FoliageQuality@3]
foliage.DensityScale=1.0
grass.DensityScale=1.0


; ============================================================
; SHADING
; ============================================================

[ShadingQuality@0]
r.MaterialQualityLevel=0

[ShadingQuality@1] ; Performance Mode
r.MaterialQualityLevel=1

[ShadingQuality@2]
r.MaterialQualityLevel=1

[ShadingQuality@3]
r.MaterialQualityLevel=2
